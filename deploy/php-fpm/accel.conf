; Отдельный пул PHP-FPM для Accel (не делит workers с другими сайтами на www.sock).
; Установка: sudo deploy/php-fpm/install-pool.sh

[accel]
user = www-data
group = www-data

listen = /run/php/php8.3-fpm-accel.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = dynamic
pm.max_children = 24
pm.start_servers = 6
pm.min_spare_servers = 4
pm.max_spare_servers = 12
pm.max_requests = 500
pm.process_idle_timeout = 30s

php_admin_value[upload_max_filesize] = 100M
php_admin_value[post_max_size] = 100M
php_admin_value[max_execution_time] = 120
php_admin_value[memory_limit] = 256M

catch_workers_output = yes
clear_env = no
