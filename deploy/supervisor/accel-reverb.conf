[program:accel-reverb]
process_name=%(program_name)s
command=php /var/www/accel.kz/artisan reverb:start --host=127.0.0.1 --port=6001
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/www/accel.kz/storage/logs/reverb.log
stopwaitsecs=10
