upstream php_fpm_chatswitch {
    server unix:/run/php/php8.3-fpm.sock;
    keepalive 8;
}

server {
    server_name chatswitch.10k.kz;
    root /var/www/chatswitch.10k.kz/public;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    index index.php;
    charset utf-8;

    client_body_buffer_size 256k;
    client_max_body_size 100M;

    fastcgi_connect_timeout 120;
    fastcgi_send_timeout 120;
    fastcgi_read_timeout 120;
    send_timeout 120;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        fastcgi_pass php_fpm_chatswitch;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;

        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;

        # Лимиты для multipart (Node → /api/whatsapp/inbound-media) и загрузок оператора.
        fastcgi_param PHP_VALUE "max_execution_time=120
upload_max_filesize=100M
post_max_filesize=100M";
    }

    # Reverb WebSocket proxy
    location /app/ {
        proxy_pass http://127.0.0.1:6001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/chatswitch.10k.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chatswitch.10k.kz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = chatswitch.10k.kz) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name chatswitch.10k.kz;
    return 404;
}
