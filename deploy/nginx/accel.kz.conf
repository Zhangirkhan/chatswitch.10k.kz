upstream php_fpm_accel {
    server unix:/run/php/php8.3-fpm-accel.sock;
    keepalive 16;
}

# Известные тенанты (генерируется: php artisan tenants:sync-nginx-map)
map $host $accel_tenant_known {
    default 0;
    include /var/www/accel/shared/nginx/known-tenants.map;
}

# ───────────────────────────────────────────────────────────────────────
# HTTP: лендинг и супер-админка
# ───────────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name accel.kz app.accel.kz;

    location /.well-known/acme-challenge/ {
        root /var/www/accel.kz/public;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ───────────────────────────────────────────────────────────────────────
# HTTP: поддомены тенантов — неизвестный slug → главная (без SSL-ошибки по http)
# ───────────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name *.accel.kz;

    location /.well-known/acme-challenge/ {
        root /var/www/accel.kz/public;
    }

    location / {
        if ($accel_tenant_known = 0) {
            return 302 https://accel.kz/;
        }
        return 301 https://$host$request_uri;
    }
}

# ───────────────────────────────────────────────────────────────────────
# 1) Корневой домен — лендинг
# ───────────────────────────────────────────────────────────────────────
server {
    server_name accel.kz;
    root /var/www/accel.kz/public;

    include snippets/accel-app.conf;

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate     /etc/letsencrypt/live/accel.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/accel.kz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# ───────────────────────────────────────────────────────────────────────
# 2) Супер-админка — app.accel.kz
# ───────────────────────────────────────────────────────────────────────
server {
    server_name app.accel.kz;
    root /var/www/accel.kz/public;

    include snippets/accel-app.conf;

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate     /etc/letsencrypt/live/app.accel.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.accel.kz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# ───────────────────────────────────────────────────────────────────────
# 3) Catchall *.accel.kz — неизвестные поддомены → https://accel.kz/
#    Сертификат: accel.kz-wildcard (DNS-01), иначе браузер предупредит о CN.
#    Выпуск: sudo deploy/nginx/issue-wildcard-cert.sh
#           sudo deploy/nginx/install-wildcard-ssl.sh
# ───────────────────────────────────────────────────────────────────────
server {
    server_name *.accel.kz;
    root /var/www/accel.kz/public;

    listen [::]:443 ssl;
    listen 443 ssl;
    # До выпуска wildcard — accel.kz (браузер предупредит на чужом поддомене).
    # После: sudo deploy/nginx/install-wildcard-ssl.sh
    ssl_certificate     /etc/letsencrypt/live/accel.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/accel.kz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    if ($accel_tenant_known = 0) {
        return 302 https://accel.kz/;
    }

    include snippets/accel-app.conf;
}

# ───────────────────────────────────────────────────────────────────────
# Legacy redirect
# ───────────────────────────────────────────────────────────────────────
server {
    listen [::]:443 ssl;
    listen 443 ssl;
    server_name chatswitch.10k.kz;

    ssl_certificate     /etc/letsencrypt/live/chatswitch.10k.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chatswitch.10k.kz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://accel.kz$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name chatswitch.10k.kz;
    return 301 https://accel.kz$request_uri;
}
