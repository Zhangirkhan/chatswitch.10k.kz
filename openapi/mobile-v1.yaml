openapi: 3.0.3
info:
  title: Accel API
  version: "1.0.0"
  description: |
    ## Мобильный REST API (`/api/v1/...`)

    **Хост:** `https://{slug}.accel.kz` — slug рабочего пространства (тенанта).
    Перед логином проверьте slug через `GET /api/v1/workspace`.

    Bearer-токен Laravel Sanctum. Роли `administrator`, `manager`, `employee`.

    **Неактивный пользователь** (`is_active: false`): логин — HTTP 403; при уже выданном токене — 403.

    **Приостановленный тенант** (`subscription_status: suspended|canceled` или `is_active: false`): HTTP 403 на все API-маршруты.

    **Лимиты:** `throttle:api`; неудачные логины — до 5 попыток по email+IP (429).
    PIN-login — до 8 попыток на IP+компанию и до 25 на компанию суммарно (429).
    Проверка workspace — до 30 req/min на IP.

    **Токены Sanctum:** по умолчанию срок жизни 30 суток (`SANCTUM_EXPIRATION_MINUTES`).
    Токен привязан к тенанту: запрос с токеном другой компании на чужом поддомене → HTTP 403.

    **Публичный workspace:** до логина возвращаются только `slug` и `name` (без статуса подписки).

    ---

    ## Realtime (Reverb / WebSocket)

    После логина подключайтесь к Reverb и авторизуйте private-каналы:

    - `POST /broadcasting/auth` с заголовком `Authorization: Bearer {token}`
    - Каналы: `private-t.{companyId}.chat.{chatId}`, `private-t.{companyId}.chats.list.{userId}`,
      `private-t.{companyId}.team-conversation.{conversationId}`, `private-t.{companyId}.team-inbox.{userId}`
    - События: `.message.received`, `.user.typing`, `.message.reactions`, `.team.message`, `.team.typing`, …

    Параметры подключения — из env бэкенда: `REVERB_APP_KEY`, `REVERB_HOST`, `REVERB_PORT`, `REVERB_SCHEME`.

    ---

    ## Веб-эндпоинты (сессия, CSRF) — deprecated для мобилки

    Ниже в спеке могут оставаться legacy-маршруты без префикса `/api/v1`.
    Мобильное приложение должно использовать только `/api/v1/*` с Bearer-токеном.

servers:
  - url: /
    description: Текущий хост приложения

tags:
  - name: Workspace
    description: Проверка рабочего пространства (slug)
  - name: Settings
    description: Системные настройки и флаги модулей
  - name: TeamChat
    description: Внутренний чат организации
  - name: Contacts
    description: Клиенты и контакты
  - name: Media
    description: Медиа вложения сообщений
  - name: Departments
    description: Отделы
  - name: Devices
    description: Регистрация FCM-токенов для push-уведомлений (Android)
  - name: Users
    description: Сотрудники tenant (team chat, pickers)
  - name: Chats
    description: Чаты и сообщения
  - name: AI-ассистент
    description: |
      AI-помощник оператора в окне диалога. Анализирует переписку чата и предлагает
      формулировки ответов. Видит до 80 последних сообщений. Лимит — 30 req/min.
      **Авторизация:** сессия (`auth`). Требует права `view` на чат.
  - name: Воронки продаж
    description: |
      CRUD воронок и этапов, аналитика. Только роль `administrator` (кроме аналитики).
      **Авторизация:** сессия (`auth`).
  - name: Задачи
    description: |
      Посты-задачи внутри отделов. Статусы: `open`, `in_progress`, `done`.
      Завершённые задачи (done) уходят в архив.
      **Авторизация:** сессия (`auth`).

paths:
  /api/v1/workspace:
    get:
      tags: [Workspace]
      summary: Информация о рабочем пространстве (публично)
      operationId: workspaceShow
      description: |
        Вызывается на поддомене `{slug}.accel.kz` до логина для проверки slug.
        Rate limit: 30 запросов/мин на IP. В ответе только `slug` и `name`.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicTenantResourceResponse"
        "404":
          description: Тенант не найден
        "429":
          description: Слишком много запросов

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Вход (выдача токена)
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Успех
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "403":
          description: Аккаунт деактивирован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "422":
          description: Неверные учётные данные или ошибка валидации
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "429":
          description: Слишком много попыток входа

  /api/v1/auth/login/pin:
    post:
      tags: [Auth]
      summary: Вход по PIN (выдача токена)
      operationId: authLoginPin
      description: |
        PIN ровно 6 цифр, уникален внутри компании. Назначается администратором в CRM.
        Подробнее — docs/mobile-api/PIN.md
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PinLoginRequest"
      responses:
        "200":
          description: Успех
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "403":
          description: Аккаунт деактивирован или тенант заблокирован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "422":
          description: Неверный PIN или ошибка валидации
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "429":
          description: Слишком много попыток (8 на IP+company, 25 на company)

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Выход (отзыв текущего токена)
      operationId: authLogout
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
        "401":
          description: Нет или недействительный токен

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Текущий пользователь
      operationId: authMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK (обёртка Laravel `data`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResourceResponse"
        "401":
          description: Не авторизован
        "403":
          description: Нет роли / деактивирован

  /api/v1/devices:
    post:
      tags: [Devices]
      summary: Регистрация FCM-токена устройства
      operationId: devicesRegister
      description: |
        Upsert по `(user_id, fcm_token)`. При login другого пользователя на том же устройстве
        токен перепривязывается к новому `user_id`. Rate limit — 60 req/min на пользователя.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterDeviceRequest"
      responses:
        "200":
          description: Токен обновлён
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceResourceResponse"
        "201":
          description: Токен зарегистрирован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceResourceResponse"
        "401":
          description: Не авторизован
        "422":
          description: Ошибка валидации
        "429":
          description: Слишком много запросов

  /api/v1/devices/{id}:
    delete:
      tags: [Devices]
      summary: Удаление регистрации устройства
      operationId: devicesDestroy
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Удалено
        "401":
          description: Не авторизован
        "404":
          description: Устройство не найдено или не принадлежит пользователю

  /api/v1/devices/unregister:
    post:
      tags: [Devices]
      summary: Снятие регистрации по FCM-токену
      operationId: devicesUnregister
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnregisterDeviceRequest"
      responses:
        "204":
          description: OK
        "401":
          description: Не авторизован
        "422":
          description: Ошибка валидации

  /api/v1/users:
    get:
      tags: [Users]
      summary: Список активных сотрудников tenant
      operationId: usersIndex
      description: |
        Для экрана «Написать коллеге» (team chat). Все роли видят всех active коллег tenant.
        Текущий пользователь исключён. Alias — `GET /api/v1/staff`.
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
            maxLength: 100
          description: Поиск по name / email
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ColleagueListResponse"
        "401":
          description: Не авторизован
        "403":
          description: Нет роли / деактивирован

  /api/v1/staff:
    get:
      tags: [Users]
      summary: Alias списка сотрудников
      operationId: staffIndex
      description: То же, что `GET /api/v1/users`.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ColleagueListResponse"
        "401":
          description: Не авторизован

  /api/v1/departments:
    get:
      tags: [Departments]
      summary: Список активных отделов
      operationId: departmentsIndex
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK (обёртка Laravel `data`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepartmentListResponse"
        "401":
          description: Не авторизован
        "403":
          description: Нет роли / деактивирован

  /api/v1/whatsapp/sessions:
    get:
      tags: [Settings]
      summary: WhatsApp-подключения (bootstrap)
      operationId: whatsappSessionsBootstrap
      description: |
        Список сессий тенанта с актуальными статусами и подсказками для UI.
        При доступном whatsapp-service выполняется reconcile с Node.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsappSessionsBootstrapResponse"
        "401":
          description: Не авторизован
        "403":
          description: Нет роли / деактивирован

  /api/v1/chats:
    get:
      tags: [Chats]
      summary: Список чатов (не в архиве)
      operationId: chatsIndex
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: per_page
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - in: query
          name: search
          schema: { type: string }
          description: Поиск по имени чата / контакту (как на вебе)
        - in: query
          name: filter
          schema:
            type: string
            enum: [all, mine, favorites, auto_reply, closed]
          description: |
            Server-side фильтр inbox.
            `mine` — назначенные текущему пользователю (admin/manager).
            `favorites` — избранные.
            `auto_reply` — AI auto (`ai_enabled` + `ai_mode=auto`, не группы).
            `closed` — закрытые лиды (`is_lead_closed=true`).
      responses:
        "200":
          description: Пагинированный список
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedChats"
        "401":
          description: Не авторизован
        "403":
          description: Нет доступа

  /api/v1/chats/archived:
    get:
      tags: [Chats]
      summary: Архивные чаты
      operationId: chatsArchived
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1 }
        - in: query
          name: per_page
          schema: { type: integer, minimum: 1, maximum: 100 }
        - in: query
          name: search
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedChats"

  /api/v1/chats/{chat}:
    get:
      tags: [Chats]
      summary: Карточка чата
      operationId: chatsShow
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChatId"
      responses:
        "200":
          description: OK (обёртка Laravel `data`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResourceResponse"
        "403":
          description: Политика ChatPolicy (нет view)
        "404":
          description: Чат не найден

  /api/v1/chats/{chat}/messages:
    get:
      tags: [Chats]
      summary: История сообщений (курсор)
      operationId: chatMessages
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChatId"
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - in: query
          name: before_timestamp
          schema: { type: string }
          description: Загрузка страницы старше этого времени
        - in: query
          name: before_id
          schema: { type: integer }
          description: Уточнение при равном before_timestamp
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagesCursorResponse"
        "403":
          description: Нет view на чат
    post:
      tags: [Chats]
      summary: Отправить исходящее текстовое сообщение
      operationId: chatSendMessage
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChatId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    $ref: "#/components/schemas/Message"
        "403":
          description: Нет sendMessage / view
        "422":
          description: Валидация

  /api/v1/chats/{chat}/read:
    post:
      tags: [Chats]
      summary: Отметить прочитанным (сброс unread + seen в WhatsApp)
      operationId: chatMarkRead
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChatId"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessFlag"
        "403":
          description: Нет view

  /api/v1/chats/{chat}/typing:
    post:
      tags: [Chats]
      summary: Индикатор «печатает»
      operationId: chatTyping
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChatId"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessFlag"
        "403":
          description: Нет view

  /api/v1/chats/{chat}/translate-draft:
    post:
      tags: [Chats]
      summary: Перевод черновика исходящего сообщения
      operationId: chatTranslateDraft
      description: |
        Переводит текст в поле ввода на язык клиента (OpenAI).
        `lang` опционален — если не передан, backend определяет целевой язык по переписке.
        Лимит — 30 запросов в минуту.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChatId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatDraftTranslationRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatDraftTranslationResponse"
        "403":
          description: Нет view на чат
        "503":
          description: Сервис перевода недоступен

  /api/v1/chats/{chat}/ai:
    patch:
      tags: [Chats]
      summary: Включить/выключить автоответ AI в чате
      operationId: chatAiSettingsUpdate
      description: |
        Toggle `ai_enabled` / `ai_mode` (как на вебе `PATCH /chats/{chat}/ai`).
        Policy `manageAi`: administrator — все чаты; manager/employee — только назначенные.
        Лимит — 30 запросов в минуту.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChatId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatAiSettingsRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatAiSettingsResponse"
        "403":
          description: Нет manageAi
        "422":
          description: Требуется подтверждение (risky enable) или ошибка валидации
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatAiSettingsConfirmation"

  /api/v1/funnels/active:
    get:
      tags: [Funnels]
      summary: Список активных воронок (picker)
      operationId: funnelsActive
      description: |
        Активные воронки tenant для выбора на доске и первого запуска приложения.
        Доступно всем ролям с включённым модулем `module_funnels`.
      security:
        - bearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ActiveFunnel"
        "403":
          description: Модуль воронок отключён

  /api/v1/broadcasts:
    get:
      tags: [Broadcasts]
      summary: Список кампаний рассылки
      operationId: broadcastsIndex
      description: |
        Пагинированный список кампаний (administrator, manager).
        Модуль `module_broadcasts` должен быть включён.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: per_page
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedBroadcastCampaigns"
        "403":
          description: Нет роли или модуль отключён

  # ──────────────────────────────────────────
  # AI-ассистент оператора (веб, сессия)
  # ──────────────────────────────────────────

  /chats/{chat}/ai/chat:
    post:
      tags: [AI-ассистент]
      summary: Запрос к AI-ассистенту
      operationId: aiAssistantChat
      description: |
        Принимает текущий вопрос оператора и локальную историю диалога с AI.
        Возвращает ответ AI на основе последних 80 сообщений чата.
        Лимит — 30 запросов в минуту (`throttle:30,1`).
      parameters:
        - $ref: "#/components/parameters/ChatId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiChatRequest"
      responses:
        "200":
          description: Ответ AI
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiChatResponse"
        "403":
          description: Нет права view на чат
        "429":
          description: Превышен лимит 30 req/min
        "502":
          description: OpenAI временно недоступен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "500":
          description: Непредвиденная ошибка
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  # ──────────────────────────────────────────
  # Воронки продаж (веб, сессия, administrator)
  # ──────────────────────────────────────────

  /funnels:
    get:
      tags: [Воронки продаж]
      summary: Список воронок (страница настроек)
      operationId: funnelsIndex
      description: Inertia-страница `Settings/Funnels`. Возвращает все воронки с этапами.
      responses:
        "200":
          description: HTML-страница (Inertia)
        "403":
          description: Нет роли administrator
    post:
      tags: [Воронки продаж]
      summary: Создать воронку
      operationId: funnelsStore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FunnelRequest"
      responses:
        "200":
          description: Созданная воронка
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FunnelResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /funnels/{funnel}:
    put:
      tags: [Воронки продаж]
      summary: Обновить воронку
      operationId: funnelsUpdate
      parameters:
        - $ref: "#/components/parameters/FunnelId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FunnelRequest"
      responses:
        "200":
          description: Обновлённая воронка
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FunnelResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Воронки продаж]
      summary: Удалить воронку
      operationId: funnelsDestroy
      parameters:
        - $ref: "#/components/parameters/FunnelId"
      responses:
        "200":
          description: Успех
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessFlag"

  /funnels/{funnel}/stages:
    post:
      tags: [Воронки продаж]
      summary: Добавить этап в воронку
      operationId: funnelStagesStore
      parameters:
        - $ref: "#/components/parameters/FunnelId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FunnelStageRequest"
      responses:
        "200":
          description: Воронка с новым этапом
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FunnelStageResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /funnels/{funnel}/stages/{stage}:
    put:
      tags: [Воронки продаж]
      summary: Обновить этап
      operationId: funnelStagesUpdate
      parameters:
        - $ref: "#/components/parameters/FunnelId"
        - $ref: "#/components/parameters/StageId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FunnelStageRequest"
      responses:
        "200":
          description: Обновлённый этап
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FunnelStageResponse"
        "404":
          description: Этап не принадлежит воронке
    delete:
      tags: [Воронки продаж]
      summary: Удалить этап
      operationId: funnelStagesDestroy
      parameters:
        - $ref: "#/components/parameters/FunnelId"
        - $ref: "#/components/parameters/StageId"
      responses:
        "200":
          description: Воронка без удалённого этапа
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FunnelResponse"
        "404":
          description: Этап не принадлежит воронке

  /funnels/{funnel}/stages/reorder:
    post:
      tags: [Воронки продаж]
      summary: Изменить порядок этапов (drag-and-drop)
      operationId: funnelStagesReorder
      parameters:
        - $ref: "#/components/parameters/FunnelId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stage_ids]
              properties:
                stage_ids:
                  type: array
                  minItems: 1
                  description: ID этапов в новом порядке
                  items: { type: integer }
              example:
                stage_ids: [3, 1, 2]
      responses:
        "200":
          description: Воронка с этапами в новом порядке
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FunnelResponse"

  /analytics/funnels:
    get:
      tags: [Воронки продаж]
      summary: Аналитика по воронкам
      operationId: analyticssFunnels
      description: |
        Доступно ролям `administrator`, `manager`, `employee`.
        Без фильтра — все отделы, доступные пользователю.
      parameters:
        - name: department_id
          in: query
          required: false
          schema: { type: integer }
          description: Фильтр по конкретному отделу
      responses:
        "200":
          description: Сводка и список воронок
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FunnelAnalyticsResponse"
        "403":
          description: Нет доступа к запрошенному отделу

  # ──────────────────────────────────────────
  # Задачи по отделам (веб, сессия)
  # ──────────────────────────────────────────

  /organization:
    get:
      tags: [Задачи]
      summary: Главная организации — список отделов
      operationId: organizationIndex
      responses:
        "200":
          description: Inertia-страница `Organization/Index`

  /organization/archive:
    get:
      tags: [Задачи]
      summary: Архив завершённых задач
      operationId: organizationArchive
      description: Задачи со статусом `done`. Поиск по заголовку, отделу, автору.
      responses:
        "200":
          description: Inertia-страница `Organization/Archive`

  /organization/departments/{department}:
    get:
      tags: [Задачи]
      summary: Задачи отдела
      operationId: organizationDepartmentShow
      description: |
        Возвращает Inertia-страницу с активными задачами отдела (статусы `open`, `in_progress`).
        Также передаёт `members` — список активных членов отдела для пикера ответственных.
      parameters:
        - $ref: "#/components/parameters/DepartmentId"
      responses:
        "200":
          description: Активные задачи отдела (open + in_progress) + members для пикера
        "403":
          description: Пользователь не является членом отдела

  /organization/departments/{department}/posts:
    post:
      tags: [Задачи]
      summary: Создать задачу в отделе
      operationId: organizationPostsStore
      parameters:
        - $ref: "#/components/parameters/DepartmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostRequest"
      responses:
        "200":
          description: Созданная задача
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResource"
        "403":
          description: Не является членом отдела
        "422":
          $ref: "#/components/responses/ValidationError"

  /organization/posts/{post}:
    get:
      tags: [Задачи]
      summary: Карточка задачи
      operationId: organizationPostShow
      parameters:
        - $ref: "#/components/parameters/PostId"
      responses:
        "200":
          description: Inertia-страница `Organization/Post` с комментариями и вложениями
        "403":
          description: Нет доступа к отделу
    patch:
      tags: [Задачи]
      summary: Обновить задачу
      operationId: organizationPostUpdate
      description: |
        Редактировать может автор задачи или `administrator`.
        Смена статуса на `done` переводит задачу в архив.
      parameters:
        - $ref: "#/components/parameters/PostId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostRequest"
      responses:
        "200":
          description: Обновлённая задача
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResource"
        "403":
          description: Не автор и не administrator
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Задачи]
      summary: Удалить задачу
      operationId: organizationPostDestroy
      parameters:
        - $ref: "#/components/parameters/PostId"
      responses:
        "200":
          description: Успех
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessFlag"
        "403":
          description: Не автор и не administrator

  /organization/posts/{post}/comments:
    post:
      tags: [Задачи]
      summary: Добавить комментарий к задаче
      operationId: organizationCommentsStore
      parameters:
        - $ref: "#/components/parameters/PostId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:
                  type: string
                  maxLength: 65535
      responses:
        "200":
          description: Список комментариев задачи
        "403":
          description: Нет доступа к отделу

  /organization/posts/{post}/comments/{comment}:
    delete:
      tags: [Задачи]
      summary: Удалить комментарий
      operationId: organizationCommentsDestroy
      parameters:
        - $ref: "#/components/parameters/PostId"
        - name: comment
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Успех
        "403":
          description: Не автор комментария и не administrator

  /organization/posts/{post}/attachments:
    post:
      tags: [Задачи]
      summary: Загрузить вложение к задаче
      operationId: organizationAttachmentsStore
      parameters:
        - $ref: "#/components/parameters/PostId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Добавленное вложение
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentResource"
        "403":
          description: Нет доступа к отделу

  /organization/posts/{post}/attachments/{attachment}:
    delete:
      tags: [Задачи]
      summary: Удалить вложение
      operationId: organizationAttachmentsDestroy
      parameters:
        - $ref: "#/components/parameters/PostId"
        - name: attachment
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Успех
        "403":
          description: Нет доступа

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum personal access token
      description: 'Заголовок Authorization: Bearer {token}'

  responses:
    ValidationError:
      description: Ошибка валидации
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationError"

  parameters:
    ChatId:
      name: chat
      in: path
      required: true
      description: ID чата
      schema:
        type: integer

    FunnelId:
      name: funnel
      in: path
      required: true
      description: ID воронки
      schema:
        type: integer

    StageId:
      name: stage
      in: path
      required: true
      description: ID этапа воронки
      schema:
        type: integer

    DepartmentId:
      name: department
      in: path
      required: true
      description: ID отдела
      schema:
        type: integer

    PostId:
      name: post
      in: path
      required: true
      description: ID задачи
      schema:
        type: integer

  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    PinLoginRequest:
      type: object
      required: [pin]
      properties:
        pin:
          type: string
          pattern: '^\d{6}$'
          description: Ровно 6 цифр, уникален внутри компании
          example: "482901"

    LoginResponse:
      type: object
      required: [token, token_type, user]
      properties:
        token:
          type: string
          description: Plaintext токен (показывается только при создании)
        token_type:
          type: string
          example: Bearer
        tenant:
          $ref: "#/components/schemas/Tenant"
        user:
          $ref: "#/components/schemas/User"

    Tenant:
      type: object
      properties:
        id: { type: integer }
        slug: { type: string }
        name: { type: string }
        is_active: { type: boolean }
        subscription_status: { type: string, nullable: true }

    PublicTenant:
      type: object
      properties:
        slug: { type: string }
        name: { type: string }

    PublicTenantResourceResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/PublicTenant"

    TenantResourceResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Tenant"

    LogoutResponse:
      type: object
      properties:
        message:
          type: string
          example: Выход выполнен.

    UserResourceResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/User"

    User:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: string, nullable: true }
        department_id: { type: integer, nullable: true }
        is_active: { type: boolean }
        roles:
          type: array
          items: { type: string }
          example: [employee]
        department:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/Department"

    Department:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string, nullable: true }
        is_active: { type: boolean }

    DepartmentListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Department"

    Colleague:
      type: object
      required: [id, name, email]
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string, format: email }

    ColleagueListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Colleague"

    WhatsappSession:
      type: object
      required: [id, session_name, status]
      properties:
        id: { type: integer }
        session_name: { type: string }
        display_name: { type: string, nullable: true }
        phone_number: { type: string, nullable: true }
        wa_name: { type: string, nullable: true }
        wa_platform: { type: string, nullable: true }
        status:
          type: string
          enum: [disconnected, connecting, qr_pending, connected]
        is_active: { type: boolean }
        connected_at: { type: string, format: date-time, nullable: true }
        disconnected_at: { type: string, format: date-time, nullable: true }
        last_disconnect_reason: { type: string, nullable: true }
        last_auth_failure_message: { type: string, nullable: true }
        qr_required_at: { type: string, format: date-time, nullable: true }
        status_hint: { type: string, nullable: true }

    WhatsappSessionsBootstrapResponse:
      type: object
      required: [whatsappServiceReachable, sessions]
      properties:
        whatsappServiceReachable:
          type: boolean
          nullable: true
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/WhatsappSession"

    ChatDraftTranslationRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          maxLength: 4000
        lang:
          type: string
          enum: [ru, kk, en, zh, tr, ar]
          nullable: true

    ChatDraftTranslationResponse:
      type: object
      required: [translation]
      properties:
        translation:
          type: string
        target_lang:
          type: string
          nullable: true
        target_label:
          type: string
          nullable: true
        unchanged:
          type: boolean

    ChatAiSettingsRequest:
      type: object
      required: [ai_enabled]
      properties:
        ai_enabled: { type: boolean }
        ai_mode: { type: string, enum: [auto, draft] }
        ai_responder_user_id: { type: integer, nullable: true }
        confirm_risky_enable: { type: boolean, default: false }

    ChatAiSettingsResponse:
      type: object
      required: [data, requires_confirmation, warnings]
      properties:
        data:
          type: object
          properties:
            id: { type: integer }
            ai_enabled: { type: boolean }
            ai_mode: { type: string }
            ai_responder_user_id: { type: integer, nullable: true }
            contact_id: { type: integer, nullable: true }
            funnel_id: { type: integer, nullable: true }
            funnel_stage_id: { type: integer, nullable: true }
        requires_confirmation: { type: boolean }
        warnings:
          type: array
          items: { type: string }

    ChatAiSettingsConfirmation:
      type: object
      properties:
        message: { type: string }
        requires_confirmation: { type: boolean }
        warnings:
          type: array
          items: { type: string }
        readiness: { type: object }

    ActiveFunnel:
      type: object
      required: [id, name, color]
      properties:
        id: { type: integer }
        name: { type: string }
        color: { type: string }
        description: { type: string, nullable: true }

    BroadcastCampaignSummary:
      type: object
      properties:
        id: { type: integer }
        status: { type: string }
        source: { type: string }
        ready_count: { type: integer }
        sent_count: { type: integer }
        skipped_count: { type: integer }
        failed_count: { type: integer }
        created_at: { type: string, format: date-time, nullable: true }
        started_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        session:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            label: { type: string }
        sender:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            name: { type: string }

    PaginatedBroadcastCampaigns:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/BroadcastCampaignSummary"
        meta:
          type: object
          properties:
            current_page: { type: integer }
            last_page: { type: integer }
            per_page: { type: integer }
            total: { type: integer }

    ChatResourceResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Chat"

    Chat:
      type: object
      description: Поля из ChatResource (часть опциональна, если связь не загружена)
      properties:
        id: { type: integer }
        whatsapp_chat_id: { type: string }
        whatsapp_session_id: { type: integer }
        contact_id: { type: integer, nullable: true }
        chat_name: { type: string, nullable: true }
        is_group: { type: boolean }
        last_message_text: { type: string, nullable: true }
        last_message_at: { type: string, format: date-time, nullable: true }
        last_message_direction: { type: string, nullable: true }
        unread_count: { type: integer }
        is_archived: { type: boolean }
        is_pinned: { type: boolean }
        is_muted: { type: boolean }
        muted_until: { type: string, format: date-time, nullable: true }
        is_favorite: { type: boolean }
        pinned_message_id: { type: integer, nullable: true }
        ai_enabled: { type: boolean }
        ai_mode: { type: string }
        funnel_id: { type: integer, nullable: true }
        funnel_stage_id: { type: integer, nullable: true }
        funnel_tracking_enabled: { type: boolean }
        funnel_stage_locked: { type: boolean }
        funnel:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            name: { type: string }
            color: { type: string }
        funnel_stage:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            name: { type: string }
            color: { type: string }
            stage_type: { type: string, nullable: true }
            position: { type: integer }
        funnel_progress_percent: { type: number, nullable: true }
        funnel_progress:
          type: object
          nullable: true
          properties:
            percent: { type: number }
            stage_index: { type: integer, nullable: true }
            stages_count: { type: integer }

    PaginatedChats:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Chat"
        links:
          type: object
          additionalProperties: true
        meta:
          type: object
          additionalProperties: true

    Message:
      type: object
      description: Поля из MessageResource
      properties:
        id: { type: integer }
        chat_id: { type: integer }
        direction: { type: string, enum: [inbound, outbound, system] }
        type: { type: string }
        body: { type: string, nullable: true }
        metadata: { type: object, additionalProperties: true, nullable: true }
        sender_phone: { type: string, nullable: true }
        sender_name:
          type: string
          nullable: true
          description: >
            Для outbound — подпись отправителя в UI: «Имя (Роль)» или «Имя (AI)».
            Для inbound в 1:1 — имя клиента (optional).
        sender:
          type: object
          nullable: true
          description: Разобранная подпись для outbound (fallback если sender_name пуст)
          properties:
            id: { type: integer, nullable: true }
            name: { type: string }
            role: { type: string, nullable: true, example: "Администратор" }
            label: { type: string, example: "Администратор ESL (Администратор)" }
        sent_by_user_id: { type: integer, nullable: true }
        is_forwarded: { type: boolean }
        quoted_message_id: { type: string, nullable: true }
        ack: { type: string }
        message_timestamp: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time, nullable: true }

    MessagesCursorResponse:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"

    SendMessageRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          maxLength: 4096
        display_message:
          type: string
          maxLength: 4096
          nullable: true
        quoted_message_id:
          type: string
          maxLength: 255
          nullable: true
        mentions:
          type: array
          maxItems: 20
          items: { type: string }
        mentions_meta:
          type: array
          maxItems: 20
          items:
            type: object
            required: [id, number, label]
            properties:
              id: { type: string }
              number: { type: string }
              label: { type: string }

    SuccessFlag:
      type: object
      properties:
        success:
          type: boolean
          example: true

    ErrorMessage:
      type: object
      properties:
        message:
          type: string

    ValidationError:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items: { type: string }

    # ── AI-ассистент ──────────────────────────

    AiChatRequest:
      type: object
      properties:
        message:
          type: string
          maxLength: 4000
          nullable: true
          description: Вопрос оператора к AI. Если пусто — AI сам предложит ответ.
        history:
          type: array
          maxItems: 40
          nullable: true
          description: Локальная история диалога оператора с AI (без system-сообщений).
          items:
            type: object
            required: [role, content]
            properties:
              role:
                type: string
                enum: [user, assistant]
              content:
                type: string
                maxLength: 6000
      example:
        message: "Предложи ответ на последнее сообщение клиента"
        history:
          - role: user
            content: "О чём этот диалог?"
          - role: assistant
            content: "Клиент интересуется доставкой товара..."

    AiChatResponse:
      type: object
      required: [reply, reply_draft]
      properties:
        reply:
          type: string
          description: Полный ответ AI оператору (с пояснениями и intro)
        reply_draft:
          type: string
          description: >
            Готовый текст для вставки клиенту — без кавычек, intro («Лучше так:») и пояснений.
            Используйте это поле для быстрых подсказок и отправки сообщения.
        reply_intro:
          type: string
          nullable: true
          description: Вводная часть ответа, если AI вернул варианты
        reply_variants:
          type: array
          nullable: true
          items:
            type: object
            properties:
              label:
                type: string
              text:
                type: string
          description: Варианты ответа для выбора оператором
        product:
          type: object
          nullable: true
          description: Карточка товара, если AI предложил прикрепить продукт

    # ── Воронки продаж ────────────────────────

    FunnelRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 1000
          nullable: true
        color:
          type: string
          maxLength: 16
          example: "#25d366"
          nullable: true
        is_active:
          type: boolean
          default: true
      example:
        name: "Основная воронка"
        description: "Основной процесс продаж"
        color: "#3b82f6"
        is_active: true

    FunnelStageRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255
        color:
          type: string
          maxLength: 16
          nullable: true
          example: "#f59e0b"
        is_active:
          type: boolean
          default: true

    FunnelStage:
      type: object
      properties:
        id: { type: integer }
        funnel_id: { type: integer }
        name: { type: string }
        color: { type: string, nullable: true }
        position: { type: integer }
        is_active: { type: boolean }

    Funnel:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string, nullable: true }
        color: { type: string }
        is_active: { type: boolean }
        position: { type: integer }
        stages_count: { type: integer }
        stages:
          type: array
          items:
            $ref: "#/components/schemas/FunnelStage"

    FunnelResponse:
      type: object
      required: [success, funnel]
      properties:
        success: { type: boolean }
        funnel:
          $ref: "#/components/schemas/Funnel"

    FunnelStageResponse:
      type: object
      required: [success, funnel, stage]
      properties:
        success: { type: boolean }
        funnel:
          $ref: "#/components/schemas/Funnel"
        stage:
          $ref: "#/components/schemas/FunnelStage"

    FunnelAnalyticsStageSummary:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        color: { type: string, nullable: true }
        is_active: { type: boolean }
        selected:
          type: boolean
          description: Отмечен ли этап хотя бы одним из отделов в scope

    FunnelAnalyticsDepartment:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }

    FunnelAnalyticsRow:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        color: { type: string }
        is_active: { type: boolean }
        stages_count: { type: integer }
        selected_stages_count: { type: integer }
        coverage_percent:
          type: number
          format: float
          nullable: true
          description: "% этапов, отмеченных отделами"
        departments_count: { type: integer }
        departments:
          type: array
          items:
            $ref: "#/components/schemas/FunnelAnalyticsDepartment"
        stages:
          type: array
          items:
            $ref: "#/components/schemas/FunnelAnalyticsStageSummary"

    FunnelAnalyticsResponse:
      type: object
      required: [summary, funnels]
      properties:
        summary:
          type: object
          properties:
            total_funnels: { type: integer }
            active_funnels: { type: integer }
            connected_funnels: { type: integer }
            total_stages: { type: integer }
            selected_stages: { type: integer }
            departments_in_scope: { type: integer }
            stage_coverage_percent:
              type: number
              format: float
              nullable: true
        funnels:
          type: array
          items:
            $ref: "#/components/schemas/FunnelAnalyticsRow"

    # ── Задачи (DepartmentPost) ───────────────

    PostRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          maxLength: 255
        body:
          type: string
          maxLength: 65535
          nullable: true
          description: Подробное описание задачи
        status:
          type: string
          enum: [open, in_progress, done]
          default: open
        due_at:
          type: string
          format: date-time
          nullable: true
          description: Срок выполнения (ISO 8601)
        assignee_ids:
          type: array
          nullable: true
          description: |
            ID ответственных пользователей. Допускаются только члены отдела.
            Передайте пустой массив `[]` для снятия всех ответственных.
            Если поле отсутствует — текущие ответственные не меняются (только при PATCH).
          items:
            type: integer
      example:
        title: "Подготовить коммерческое предложение"
        body: "Описание задачи..."
        status: "open"
        due_at: "2026-05-20T18:00:00"
        assignee_ids: [3, 7]

    PostAuthor:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }

    PostResource:
      type: object
      properties:
        id: { type: integer }
        department_id: { type: integer }
        title: { type: string }
        body: { type: string, nullable: true }
        status:
          type: string
          enum: [open, in_progress, done]
        due_at:
          type: string
          format: date-time
          nullable: true
        author:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/PostAuthor"
        assignees:
          type: array
          description: Список ответственных за задачу (только члены отдела)
          items:
            $ref: "#/components/schemas/PostAuthor"
        comments_count: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/AttachmentResource"

    AttachmentResource:
      type: object
      properties:
        id: { type: integer }
        original_name: { type: string }
        url: { type: string, format: uri }
        mime_type: { type: string }
        size:
          type: integer
          description: Размер в байтах
        is_image: { type: boolean }
        uploaded_by:
          type: integer
          description: ID пользователя, загрузившего файл

    RegisterDeviceRequest:
      type: object
      required: [platform, fcm_token]
      properties:
        platform:
          type: string
          enum: [android, ios]
          description: v1 — только android
        fcm_token:
          type: string
          minLength: 20
          maxLength: 512
        device_name:
          type: string
          maxLength: 255
          nullable: true
        app_version:
          type: string
          maxLength: 64
          nullable: true

    UnregisterDeviceRequest:
      type: object
      required: [fcm_token]
      properties:
        fcm_token:
          type: string
          minLength: 20
          maxLength: 512

    DeviceResource:
      type: object
      properties:
        id: { type: integer }
        platform: { type: string }
        fcm_token: { type: string }
        updated_at: { type: string, format: date-time, nullable: true }

    DeviceResourceResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/DeviceResource"
